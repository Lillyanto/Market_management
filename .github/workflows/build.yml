name: Flutter Android Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  # ✏️ Change this to the folder containing your pubspec.yaml
  # Examples:
  #   "."                      → pubspec.yaml is at repo root
  #   "app"                    → my_repo/app/pubspec.yaml
  #   "market_management"      → my_repo/market_management/pubspec.yaml
  FLUTTER_PROJECT_DIR: "."

jobs:
  build-android-apk:
    name: Build Android APK (Debug)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.FLUTTER_PROJECT_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      #- name: Run tests
      #  run: flutter test

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: ${{ env.FLUTTER_PROJECT_DIR }}/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
